<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Script - TKE Chapter Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cherry: #AD2624;
      --border: #e2e2e2;
    }

    body {
      font-family: "Nunito Sans", sans-serif;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      gap: 16px;
    }

    .label {
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* Browser chrome */
    .browser {
      width: 100%;
      max-width: 1000px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }

    .browser-bar {
      background: #3a3a3a;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #FF5F57; }
    .dot-y { background: #FFBD2E; }
    .dot-g { background: #28C840; }
    .url-bar {
      flex: 1;
      background: #555;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
    }

    /* Page wrapper - relative for FAB positioning */
    .page-wrap {
      position: relative;
      display: block;
      line-height: 0;
    }

    .page-screenshot {
      width: 100%;
      display: block;
    }

    /* THE SCRIPT FAB */
    .script-fab {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #ffffff;
      color: var(--cherry);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px 10px 4px 4px;
      font-size: 8px;
      font-weight: 800;
      font-family: "Nunito Sans", sans-serif;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      letter-spacing: 0.3px;
      line-height: 1;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.35); }
      50% { box-shadow: 0 8px 40px rgba(173,38,36,0.45); }
    }

    .fab-crest {
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* Annotation */
    .annotation {
      position: absolute;
      bottom: 52px;
      right: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }
    .annotation-tag {
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }
    .annotation-arrow { font-size: 12px; color: rgba(255,255,255,0.8); text-align: right; }
  </style>
</head>
